      /* TAB MENU */ 
  

    .tab-menu { 
    display: flex; 
    width: calc(100% + 80px);  /* tambahkan 40 kiri + 40 kanan */
    margin: 50px -40px 20px -40px; 
    padding: 0; 
    border-bottom:1px solid #000;

    background-color: #fff; 
    overflow-x: auto; 
}

    /* .tab { padding: 15px 20px; border: none; background: #fff; border-right: 1px solid #000; cursor: pointer; } */ 
      .tab-menu .tab {

        padding: 20px 10px; 
        border: none; 
        border-right: 1px solid #000; 
        background: #fff; 
        cursor: pointer; 
        font-weight: 600; 
        white-space: nowrap; 
    } 
      .tab-menu .tab:last-child { 
        border-right: none; } /* .tab.aktif { background: #7b0000; color: white; } */

    }

     /* NEW PROFIL */
      /* USER PROFILE */
      .user-profile {
        position: absolute;
        top: 20px;
        right: 40px;
        cursor: pointer;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f2f2f2;
        padding: 10px 15px;
        border-radius: 15px;
      }

      .user-icon {
        font-size: 24px;
      }

      .user-name {
        font-weight: bold;
        font-size: 14px;
      }

      
      /* DROPDOWN */
      .dropdown-menu {
        display: none;
        position: absolute;
        top: 60px;
        right: 0;
        background: #f2f2f2;
        border-radius: 15px;
        padding: 15px 20px;
        width: 200px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .dropdown-menu a {
        display: block;
        text-decoration: none;
        color: #2c3e50;
        font-weight: 600;
        margin-bottom: 15px;
      }

      .dropdown-menu a:last-child {
        margin-bottom: 0;
      }

      /* TAMPIL SAAT AKTIF */
      .user-profile.active .dropdown-menu {
        display: block;
      }

      
    </style>
