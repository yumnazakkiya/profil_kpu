<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Data Pegawai</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .kontrol {
        display: flex;
        justify-content: space-between;
        margin: 20px 0;
        margin-top: 70px;
      }

      .kontrol select,
      .kontrol input {
        padding: 6px;
        margin-left: 6px;
      }

      /* TABEL */
      .tabel {
        width: 100%;
        border-collapse: collapse;
      }

      .tabel th,
      .tabel td {
        border: 1px solid #000;
        padding: 10px;
        text-align: center;
      }

      .tabel th {
        font-weight: bold;
      }

      .aksi {
        font-size: 18px;
        cursor: pointer;
      }

      /* NEW PROFIL */
      /* USER PROFILE */
      .user-profile {
        position: absolute;
        top: 20px;
        right: 40px;
        cursor: pointer;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f2f2f2;
        padding: 10px 15px;
        border-radius: 15px;
      }

      .user-icon {
        font-size: 24px;
      }

      .user-name {
        font-weight: bold;
        font-size: 14px;
      }

      
      /* DROPDOWN */
      .dropdown-menu {
        display: none;
        position: absolute;
        top: 60px;
        right: 0;
        background: #f2f2f2;
        border-radius: 15px;
        padding: 15px 20px;
        width: 200px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .dropdown-menu a {
        display: block;
        text-decoration: none;
        color: #2c3e50;
        font-weight: 600;
        margin-bottom: 15px;
      }

      .dropdown-menu a:last-child {
        margin-bottom: 0;
      }

      /* TAMPIL SAAT AKTIF */
      .user-profile.active .dropdown-menu {
        display: block;
      }
    </style>
  </head>
  <body class="role-admin">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <span>LOGO</span>
        <button class="tombol-menu" id="tombolMenu">✕</button>
      </div>

      <hr class="garis-menu" />

      <div class="item-menu aktif">Profil Data Pegawai</div>

      <hr class="garis-menu" />

      <div class="item-menu">Tambah Data Pegawai Baru</div>

      <hr class="garis-menu" />

      <div class="item-menu">Pengaturan Akun</div>

      <hr class="garis-menu" />

      <div class="item-menu">Data Master</div>

      <hr class="garis-menu" />
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="konten">
      <h2>Data Pegawai</h2>
      <!-- <button class="tombol-keluar">Log Out</button> -->
      <div class="user-profile" id="userProfile">
        <div class="user-info">
          <div class="user-icon">👤</div>
          <div class="user-text">
            <div class="user-name">TU SEKRETARIS KPU</div>
            <!-- <div class="user-role">Tata Usaha</div> -->
          </div>
        </div>

        <div class="dropdown-menu" id="dropdownMenu">
          <a href="#">Beranda</a>
          <a href="#">Keluar</a>
        </div>
      </div>

      <!-- KONTROL TABEL -->
      <section class="kontrol">
        <div>
          Tampilkan
          <select id="jumlahData">
            <option>10</option>
            <option>25</option>
            <option>50</option>
          </select>
          Entri
        </div>

        <div>
          Cari
          <input type="text" id="pencarian" placeholder="Cari data..." />
        </div>
      </section>

      <!-- TABEL -->
      <table class="tabel">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Jabatan</th>
            <th>Golongan</th>
            <th>NIP</th>
            <th>Tipe Karyawan</th>
            <th>Divisi/Unit</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="isiTabel">
          <tr>
            <td>1</td>
            <td>Contoh Nama</td>
            <td>Staff</td>
            <td>III A</td>
            <td>123456789</td>
            <td>Tetap</td>
            <td>IT</td>
            <td class="aksi">
              👁
              <a href="identitas-pegawai.html?id=1" title="Edit Data">✏️</a>
              🖨
            </td>
          </tr>
        </tbody>
      </table>
    </main>

    <script src="script.js"></script>
    <script>
      // Dropdown User Profile
      const userProfile = document.getElementById("userProfile");

      if (userProfile) {
        userProfile.addEventListener("click", function () {
          userProfile.classList.toggle("active");
        });

        // Tutup jika klik luar
        document.addEventListener("click", function (e) {
          if (!userProfile.contains(e.target)) {
            userProfile.classList.remove("active");
          }
        });
      }
    </script>
  </body>
</html>
